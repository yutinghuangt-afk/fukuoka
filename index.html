<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福岡 × 由布院 × 太宰府｜8人旅行攻略</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-deep-blue: #1F3864;
            --color-cream: #F9F6F0;
            --color-warm-orange: #C55A11;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-cream);
            color: var(--color-deep-blue);
        }
        .nav-active {
            border-bottom: 3px solid var(--color-warm-orange);
            color: var(--color-warm-orange);
            font-weight: bold;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .timeline-item {
            position: relative;
            padding-left: 2rem;
            border-left: 2px solid var(--color-warm-orange);
            margin-bottom: 1.5rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 0;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--color-warm-orange);
            border: 3px solid white;
        }
        .btn-primary {
            background-color: var(--color-deep-blue);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-orange {
            background-color: var(--color-warm-orange);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }
        .section-hidden {
            display: none;
        }
        .magazine-title {
            position: relative;
            display: inline-block;
            padding: 0.5rem 1rem;
            border-top: 2px solid var(--color-deep-blue);
            border-bottom: 2px solid var(--color-deep-blue);
            letter-spacing: 0.1em;
        }
        .map-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 16px;
            background: var(--color-deep-blue);
            color: white;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .map-btn:hover {
            opacity: 0.85;
        }
        /* 排序按鈕樣式 */
        .sort-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.15s;
        }
        .sort-btn:hover {
            background: #f3f4f6;
        }
        .sort-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- 導覽列 -->

                    <a href="#" onclick="showPage('home')" id="nav-home" class="nav-item py-4 px-2 nav-active">首頁</a>

                    <button onclick="checkAdminLogin()" class="text-sm border border-gray-300 px-3 py-1 rounded hover:bg-gray-100">管理</button>

    <main id="content-area" class="flex-grow container mx-auto px-4 py-8 max-w-6xl"></main>

    <footer class="bg-gray-800 text-white py-8 text-center">
        <p>© 2026 福岡 8 人旅行團 - 一起創造美好回憶</p>
    </footer>

    <!-- 管理登入 Modal -->

            <div class="mb-4">
                <label class="block text-sm mb-1">帳號</label>
                <input type="text" id="admin-user" class="w-full border p-2 rounded" placeholder="fukuoka2026">
            </div>
            <div class="mb-6">
                <label class="block text-sm mb-1">密碼</label>
                <input type="password" id="admin-pass" class="w-full border p-2 rounded" placeholder="travel8people">
            </div>
            <div class="flex justify-end space-x-2">
                <button onclick="closeLoginModal()" class="px-4 py-2 text-gray-600">取消</button>
                <button onclick="login()" class="btn-primary">登入</button>
            </div>
        </div>
    </div>

    <script>

                ]},
                { day: 6, date: "10/4 (日)", title: "返程", items: [
                    { time: "09:00", event: "The Full Full Hakata 明太子麵包", cost: 0 },
                    { time: "09:30", event: "博多站最後採買（努努雞、福砂屋長崎蛋糕）", cost: 0 },

            attractions: [

                { name: "博多運河城", desc: "大型購物中心，噴水池表演與多樣店舖。", tag: "購物", mapUrl: "https://www.google.com/maps/search/Canal+City+Hakata+福岡" },
                { name: "金鱗湖", desc: "由布院知名景點，晨霧迷濛非常美麗。", tag: "自然", mapUrl: "https://www.google.com/maps/search/金鱗湖+由布院" },

                { name: "SNOOPY茶屋", desc: "結合史努比與和風特色的主題茶屋。", tag: "特色", mapUrl: "https://www.google.com/maps/search/SNOOPY茶屋+由布院" },
                { name: "吉卜力どんぐりの森", desc: "宮崎駿迷必訪的周邊商品店。", tag: "購物", mapUrl: "https://www.google.com/maps/search/どんぐりの森+由布院" },

                { name: "BBB POTTERS", desc: "藥院區知名的生活選物店。", tag: "購物", mapUrl: "https://www.google.com/maps/search/BBB+POTTERS+薬院+福岡" },
                { name: "藥院文青區", desc: "充滿特色小店、咖啡廳的靜謐街區。", tag: "散策", mapUrl: "https://www.google.com/maps/search/薬院+福岡" },
                { name: "太宰府天滿宮", desc: "祭祀學問之神，隈研吾設計的星巴克必看。", tag: "文化", mapUrl: "https://www.google.com/maps/search/太宰府天満宮" },
                { name: "竈門神社", desc: "鬼滅之刃聖地，也是知名的結緣神社。", tag: "文化", mapUrl: "https://www.google.com/maps/search/竈門神社+太宰府" },
                { name: "博多車站", desc: "福岡交通樞紐，也是買伴手禮與購物的好地方。", tag: "購物", mapUrl: "https://www.google.com/maps/search/博多駅+福岡" }
            ],
            food: [
                { name: "一蘭拉麵 總本店", cat: "拉麵", desc: "福岡起家的拉麵名店，總本店氣勢非凡。", reserve: false, mapUrl: "https://www.google.com/maps/search/一蘭拉麵+總本店+福岡" },
                { name: "燒肉", cat: "燒肉", desc: "Day 2 午餐預定，品嚐在地和牛。", reserve: true, mapUrl: "" },
                { name: "湯之坪小食", cat: "小食", desc: "可樂餅、布丁銅鑼燒等各種街頭美食。", reserve: false, mapUrl: "" },
                { name: "B-speak蛋糕捲", cat: "甜點", desc: "口感綿密不甜膩，建議早點購買。", reserve: false, mapUrl: "https://www.google.com/maps/search/B-speak+由布院" },
                { name: "ShinShin拉麵", cat: "拉麵", desc: "深受當地人喜愛的豚骨拉麵，天神本店常排隊。", reserve: true, mapUrl: "https://www.google.com/maps/search/ShinShin拉麵+天神+福岡" },

                { item: "和服租借花水木", status: "未預約", note: "1.5個月前需預約" },

            ],
            shopping: [
                { item: "明太子", done: false },
                { item: "努努雞", done: false },
                { item: "福砂屋蛋糕", done: false },
                { item: "藥妝", done: false },
                { item: "運動鞋", done: false }
            ]

        // ── 資料初始化：若 localStorage 沒有資料，或舊資料缺少 highlights / food.mapUrl，則補齊 ──
        (function initData() {
            const raw = localStorage.getItem('fukuokaTravelData');
            if (!raw) {
                localStorage.setItem('fukuokaTravelData', JSON.stringify(defaultData));
                return;
            }
            const saved = JSON.parse(raw);
            // 補 highlights
            if (!saved.info.highlights) {
                saved.info.highlights = defaultData.info.highlights;
            }
            // 補 heroDesc
            if (!saved.info.heroDesc) {
                saved.info.heroDesc = defaultData.info.heroDesc;
            }
            // 補 food.mapUrl（舊資料可能沒有）
            saved.food.forEach((f, i) => {
                if (f.mapUrl === undefined) {
                    f.mapUrl = (defaultData.food[i] && defaultData.food[i].mapUrl) || "";
                }
            });
            localStorage.setItem('fukuokaTravelData', JSON.stringify(saved));
        })();

        function getData() {
            return JSON.parse(localStorage.getItem('fukuokaTravelData'));
        }
        function saveData(data) {
            localStorage.setItem('fukuokaTravelData', JSON.stringify(data));
        }

        function renderPage(pageId) {
            const data = getData();
            const container = document.getElementById('content-area');
            container.innerHTML = '';

            if (pageId === 'home') {
                let itineraryCards = '';
                data.itinerary.forEach(day => {
                    itineraryCards += `
                        <div class="card p-4 flex flex-col justify-between">
                            <div>
                                <h4 class="font-bold text-orange-700">Day ${day.day}</h4>
                                <p class="text-sm text-gray-500 mb-2">${day.date}</p>
                                <p class="font-medium">${day.title}</p>
                            </div>
                            <button onclick="showPage('itinerary')" class="mt-4 text-xs text-blue-600 hover:underline text-right">查看詳情 →</button>
                        </div>
                    `;
                });

                let total = 0;
                data.itinerary.forEach(day => {
                    day.items.forEach(item => total += (item.cost || 0));
                });

                // highlights 卡片（從 data.info.highlights 動態渲染）
                const highlights = data.info.highlights || defaultData.info.highlights;
                const highlightCards = highlights.map(h => `
                    <div class="card p-6 border-t-4 border-blue-900 text-center">
                        <div class="text-3xl mb-2">${h.icon}</div>
                        <p class="text-xs text-gray-500 mb-1">${h.label}</p>
                        <p class="font-bold text-sm">${h.value}</p>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="text-center mb-12">
                        <h1 class="text-4xl md:text-5xl font-bold mb-4 magazine-title">${data.info.title}</h1>
                        <p class="text-xl text-gray-600 mb-4">${data.info.subtitle}</p>
                        <p class="text-gray-500 max-w-xl mx-auto">${data.info.heroDesc || ''}</p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                        ${highlightCards}
                    </div>
                    <h2 class="text-2xl font-bold mb-6 flex items-center">
                        <span class="w-8 h-8 bg-blue-900 text-white rounded-full flex items-center justify-center mr-2 text-sm">01</span>
                        行程摘要
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-12">
                        ${itineraryCards}
                    </div>
                `;

            } else if (pageId === 'itinerary') {
                let timelineHtml = '';
                data.itinerary.forEach(day => {
                    let itemsHtml = '';
                    day.items.forEach(item => {
                        itemsHtml += `
                            <div class="timeline-item">
                                <div class="flex flex-col md:flex-row md:items-center">
                                    <span class="font-bold text-orange-700 w-16">${item.time}</span>
                                    <span class="flex-grow">${item.event}</span>
                                    ${item.cost > 0 ? `<span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500 mt-1 md:mt-0">¥${item.cost}</span>` : ''}
                                </div>
                            </div>
                        `;
                    });
                    timelineHtml += `
                        <div class="mb-12">
                            <div class="bg-blue-900 text-white px-4 py-2 rounded-t-lg flex justify-between items-center">
                                <h3 class="font-bold">Day ${day.day} ｜ ${day.date}</h3>
                                <span class="text-sm opacity-80">${day.title}</span>
                            </div>
                            <div class="bg-white p-6 rounded-b-lg shadow-sm">
                                ${itemsHtml}
                            </div>
                        </div>
                    `;

                                <div class="md:col-span-2"><label class="text-xs text-gray-500">Google Maps 連結</label><input type="text" value="${escHtml(attr.mapUrl || '')}" onchange="updateAttraction(${idx}, 'mapUrl', this.value)" class="w-full border rounded p-1 text-xs" placeholder="https://www.google.com/maps/search/..."></div>

            } else if (section === 'food') {

                                <button class="sort-btn" onclick="moveItem('food', ${idx}, -1)" ${isFirst ? 'disabled' : ''} title="上移">▲</button>

                                <div><label class="text-xs text-gray-500">類別</label><input type="text" value="${escHtml(f.cat)}" onchange="updateFood(${idx}, 'cat', this.value)" class="w-full border rounded p-1"></div>
                                <div class="md:col-span-2"><label class="text-xs text-gray-500">說明</label><input type="text" value="${escHtml(f.desc)}" onchange="updateFood(${idx}, 'desc', this.value)" class="w-full border rounded p-1"></div>
                                <div class="md:col-span-2"><label class="text-xs text-gray-500">Google Maps 連結</label><input type="text" value="${escHtml(f.mapUrl || '')}" onchange="updateFood(${idx}, 'mapUrl', this.value)" class="w-full border rounded p-1 text-xs" placeholder="https://www.google.com/maps/search/..."></div>
                                <div class="md:col-span-2 flex justify-between items-center">
                                    <label class="flex items-center text-sm"><input type="checkbox" ${f.reserve ? 'checked' : ''} onchange="updateFood(${idx}, 'reserve', this.checked)" class="mr-1"> 需預約</label>
                                    <button onclick="deleteFood(${idx})" class="text-red-400 text-sm">✕ 刪除</button>
                                </div>

                        </div>
                    `;
                });
                html += '</div>';
                content.innerHTML = html;

            // ── 預約/購物管理 ─────────────────────────────────────
            } else if (section === 'reservations') {
                let resHtml = '<div class="grid grid-cols-1 md:grid-cols-2 gap-8">';
                resHtml += `
                    <div>
                        <h3 class="text-xl font-bold mb-4">預約清單管理</h3>
                        <div class="bg-white p-4 rounded shadow-sm">
                            <table class="w-full text-sm">
                                <thead><tr class="border-b"><th>項目</th><th>狀態</th><th>備註</th></tr></thead>
                                <tbody>
                `;
                data.reservations.forEach((r, idx) => {
                    resHtml += `
                        <tr class="border-b">
                            <td class="py-2"><input type="text" value="${escHtml(r.item)}" onchange="updateRes(${idx}, 'item', this.value)" class="w-full border-none"></td>

        // ── 共用：HTML 特殊字元跳脫（防止引號破壞 input value） ──
        function escHtml(str) {
            return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // ── 首頁 info 更新 ──
        function updateInfo(field, value) {
            const data = getData();
            data.info[field] = value;
            saveData(data);
        }
        function updateHighlight(idx, field, value) {
            const data = getData();
            if (!data.info.highlights) data.info.highlights = defaultData.info.highlights;
            data.info.highlights[idx][field] = value;
            saveData(data);
        }

        // ── 通用排序（attractions / food） ──
        function moveItem(listKey, idx, direction) {
            const data = getData();
            const list = data[listKey];
            const target = idx + direction;
            if (target < 0 || target >= list.length) return;
            // 交換
            [list[idx], list[target]] = [list[target], list[idx]];
            saveData(data);
            renderAdminSection(listKey);
        }

        // ── 行程管理 ──
        function updateItinerary(dayIdx, itemIdx, field, value) {
            const data = getData();
            if (field === 'cost') value = parseInt(value) || 0;
            data.itinerary[dayIdx].items[itemIdx][field] = value;
            saveData(data);
        }
        function addItineraryItem(dayIdx) {
            const data = getData();
            data.itinerary[dayIdx].items.push({ time: "00:00", event: "新項目", cost: 0 });
            saveData(data);
            renderAdminSection('itinerary');
        }
        function deleteItineraryItem(dayIdx, itemIdx) {
            if (!confirm('確定刪除？')) return;
            const data = getData();
            data.itinerary[dayIdx].items.splice(itemIdx, 1);
            saveData(data);
            renderAdminSection('itinerary');
        }

        // ── 景點管理 ──
        function updateAttraction(idx, field, value) {
            const data = getData();
            data.attractions[idx][field] = value;
            saveData(data);
        }
        function addAttraction() {
            const data = getData();
            data.attractions.push({ name: "新景點", desc: "請輸入說明", tag: "標籤", mapUrl: "" });
            saveData(data);
            renderAdminSection('attractions');
        }
        function deleteAttraction(idx) {
            if (!confirm('確定刪除？')) return;
            const data = getData();
            data.attractions.splice(idx, 1);
            saveData(data);
            renderAdminSection('attractions');
        }

        // ── 美食管理 ──
        function updateFood(idx, field, value) {
            const data = getData();
            data.food[idx][field] = value;
            saveData(data);
        }
        function addFood() {
            const data = getData();
            data.food.push({ name: "新餐廳", cat: "類別", desc: "說明", reserve: false, mapUrl: "" });
            saveData(data);
            renderAdminSection('food');
        }
        function deleteFood(idx) {
            if (!confirm('確定刪除？')) return;
            const data = getData();
            data.food.splice(idx, 1);
            saveData(data);
            renderAdminSection('food');
        }

        // ── 預約/購物管理 ──
        function updateRes(idx, field, value) {
            const data = getData();
            data.reservations[idx][field] = value;
            saveData(data);
        }
        function updateShop(idx, field, value) {
            const data = getData();
            data.shopping[idx][field] = value;
            saveData(data);
        }
        function addShop() {
            const data = getData();
            data.shopping.push({ item: "新項目", done: false });
            saveData(data);
            renderAdminSection('reservations');
        }
        function deleteShop(idx) {
            const data = getData();
            data.shopping.splice(idx, 1);
            saveData(data);
            renderAdminSection('reservations');
        }

        // ── 導覽 ──
        function showPage(pageId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-active'));
            const activeNav = document.getElementById('nav-' + pageId);
            if (activeNav) activeNav.classList.add('nav-active');
            renderPage(pageId);
        }
        function checkAdminLogin() {
            if (sessionStorage.getItem('isAdmin') === 'true') {
                showPage('admin');
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
            }
        }
        function closeLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
        }
        function login() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            if (user === 'fukuoka2025' && pass === 'travel8people') {
                sessionStorage.setItem('isAdmin', 'true');
                closeLoginModal();
                showPage('admin');
            } else {
                alert('帳號或密碼錯誤');
            }
        }
        window.onload = () => { showPage('home'); };
    </script>
</body>
